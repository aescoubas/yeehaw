version: 1
name: "bootstrap-harness"
guidelines:
  - "Use concise commit-ready changes."
  - "Prefer deterministic scripts and explicit logging."

tracks:
  - id: "orchestrator"
    topic: "Core orchestration and tmux integration"
    agent: "codex"
    stages:
      - id: "design"
        title: "Design pass"
        goal: "Define modules, db schema, and control flow for the harness."
        deliverables:
          - "README.md"
          - "yeehaw/runner.py"
      - id: "implementation"
        title: "Implementation"
        goal: "Implement the orchestration loop and persist state to sqlite."
        deliverables:
          - "yeehaw/db.py"
          - "yeehaw/tmux.py"

  - id: "monitoring"
    topic: "Monitoring and UX"
    agent: "claude"
    stages:
      - id: "tui"
        title: "Monitoring TUI"
        goal: "Implement a terminal dashboard for run/track visibility."
        deliverables:
          - "yeehaw/tui.py"
      - id: "docs"
        title: "Docs"
        goal: "Document roadmap format and commands with copy/paste examples."
        deliverables:
          - "README.md"
